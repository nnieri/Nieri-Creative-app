services:
  - type: web
    name: nieri-creative-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: USE_MOCK_ARYEO
        value: "true"
      - key: ARYEO_API_BASE_URL
        value: https://api.aryeo.com/v1
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_API_KEY
        sync: false
