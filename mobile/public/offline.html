<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FFCF00" />
    <title>Nieri Creative</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
        color: #2c2c2c;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(420px, calc(100vw - 40px));
        border: 1px solid #2c2c2c;
        border-radius: 8px;
        padding: 24px;
        background: #ffcf00;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Nieri Creative</h1>
      <p>The app shell is available, but live media and AI tools need an internet connection.</p>
    </main>
  </body>
</html>
